name: docker-variants

on:
  push:
    branches:
      - master
    tags: [ 'v*.*.*' ]
    paths-ignore:
      - 'docs/**'

jobs:
  build-variants:
    name: Docker variants
    runs-on: ubuntu-latest
    if: github.repository == 'cshum/imagor'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        variant:
          - name: magick
            build_args: |
              BASE_IMAGE=ghcr.io/cshum/imagor-base:vips8.18.2-r6-magick
              ENABLE_MAGICK=true
          - name: mozjpeg
            build_args: |
              BASE_IMAGE=ghcr.io/cshum/imagor-base:vips8.18.2-r6-mozjpeg
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/cshum/imagor-${{ matrix.variant.name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ startsWith(github.ref, 'refs/tags/v') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.variant.build_args }}
